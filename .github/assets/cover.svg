<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 628" width="1200" height="628">
  <defs>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="overlay" result="blend"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.04"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="normal"/>
    </filter>

    <filter id="glow-white" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feFlood flood-color="#fff" flood-opacity="0.3"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="glow-orange" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feFlood flood-color="#fff7ed" flood-opacity="0.4"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="glow-deep" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feFlood flood-color="#fdba74" flood-opacity="0.35"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="glow-light" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feFlood flood-color="#fed7aa" flood-opacity="0.3"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Rich orange gradient background -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c2d12"/>
      <stop offset="30%" stop-color="#9a3412"/>
      <stop offset="50%" stop-color="#c2410c"/>
      <stop offset="70%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>

    <radialGradient id="hotspot1" cx="0.25" cy="0.35" r="0.7">
      <stop offset="0%" stop-color="#fb923c" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#fb923c" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#fb923c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hotspot2" cx="0.8" cy="0.65" r="0.65">
      <stop offset="0%" stop-color="#fdba74" stop-opacity="0.45"/>
      <stop offset="50%" stop-color="#fdba74" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#fdba74" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hotspot3" cx="0.5" cy="0.15" r="0.6">
      <stop offset="0%" stop-color="#ffedd5" stop-opacity="0.22"/>
      <stop offset="50%" stop-color="#ffedd5" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#ffedd5" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="centerBackdrop" cx="0.5" cy="0.48" r="0.45">
      <stop offset="0%" stop-color="#431407" stop-opacity="0.7"/>
      <stop offset="60%" stop-color="#431407" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#431407" stop-opacity="0"/>
    </radialGradient>

    <pattern id="dotGrid" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="16" r="0.7" fill="#fdba74" opacity="0.18"/>
    </pattern>

    <radialGradient id="vignetteGrad" cx="0.5" cy="0.5" r="0.7">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#431407" stop-opacity="0.6"/>
    </radialGradient>
  </defs>

  <!-- Background — warm orange gradient -->
  <rect width="1200" height="628" fill="url(#bgGrad)"/>
  <rect width="1200" height="628" fill="url(#hotspot1)"/>
  <rect width="1200" height="628" fill="url(#hotspot2)"/>
  <rect width="1200" height="628" fill="url(#hotspot3)"/>
  <rect width="1200" height="628" fill="url(#dotGrid)" opacity="0.5"/>

  <!-- TSC/TSPL label snippet — top left -->
  <g transform="translate(-30, -25) rotate(-12, 120, 160)" filter="url(#glow-orange)" opacity="0.55">
    <text fill="#fff7ed" font-family="'SF Mono','Fira Code',monospace" font-size="14" opacity="0.75">
      <tspan x="30" y="60">SIZE 40 mm,30 mm</tspan>
      <tspan x="30" y="80">GAP 3 mm,0 mm</tspan>
      <tspan x="30" y="100">CLS</tspan>
      <tspan x="30" y="120">TEXT 10,10,"3",0,2,2,"Hello"</tspan>
      <tspan x="30" y="140">BARCODE 10,50,"128",60,1,0</tspan>
      <tspan x="30" y="160">QRCODE 10,120,M,6,A,0</tspan>
      <tspan x="30" y="180">PRINT 1</tspan>
    </text>
    <text x="140" y="210" text-anchor="middle" fill="#ffedd5" opacity="0.5" font-family="'SF Mono','Fira Code',monospace" font-size="15" font-weight="bold" letter-spacing="6">TSC/TSPL</text>
  </g>

  <!-- ZPL snippet — top right -->
  <g transform="translate(870, -45) rotate(8, 150, 150)" filter="url(#glow-orange)" opacity="0.5">
    <text fill="#fff7ed" font-family="'SF Mono','Fira Code',monospace" font-size="14" opacity="0.75">
      <tspan x="30" y="60">^XA</tspan>
      <tspan x="30" y="80">^PW320^LL240</tspan>
      <tspan x="30" y="100">^CI28</tspan>
      <tspan x="30" y="120">^FO50,50^A0N,60,60</tspan>
      <tspan x="30" y="140">^FDHello World^FS</tspan>
      <tspan x="30" y="160">^FO10,120^BQN,2,5</tspan>
      <tspan x="30" y="180">^FDQM,https://...^FS</tspan>
      <tspan x="30" y="200">^XZ</tspan>
    </text>
    <text x="140" y="230" text-anchor="middle" fill="#ffedd5" opacity="0.45" font-family="'SF Mono','Fira Code',monospace" font-size="15" font-weight="bold" letter-spacing="6">ZPL II</text>
  </g>

  <!-- EPL snippet — bottom left -->
  <g transform="translate(-20, 390) rotate(6, 120, 100)" filter="url(#glow-deep)" opacity="0.45">
    <text fill="#fff7ed" font-family="'SF Mono','Fira Code',monospace" font-size="14" opacity="0.7">
      <tspan x="30" y="30">N</tspan>
      <tspan x="30" y="50">q320</tspan>
      <tspan x="30" y="70">A10,20,0,3,2,2,N,"Hello"</tspan>
      <tspan x="30" y="90">B10,50,0,0,2,4,60,B,"123"</tspan>
      <tspan x="30" y="110">b10,100,0,Q,2,6,"data"</tspan>
      <tspan x="30" y="130">P1</tspan>
    </text>
    <text x="140" y="160" text-anchor="middle" fill="#ffedd5" opacity="0.4" font-family="'SF Mono','Fira Code',monospace" font-size="15" font-weight="bold" letter-spacing="6">EPL2</text>
  </g>

  <!-- ESC/POS hex — bottom right -->
  <g transform="translate(870, 410) rotate(-6, 150, 100)" filter="url(#glow-light)" opacity="0.4">
    <text fill="#fff7ed" font-family="'SF Mono','Fira Code',monospace" font-size="14" opacity="0.7">
      <tspan x="30" y="30">1B 40</tspan>
      <tspan x="30" y="50">1B 61 01</tspan>
      <tspan x="30" y="70">1B 45 01  Hello</tspan>
      <tspan x="30" y="90">1D 6B 49 06  123456</tspan>
      <tspan x="30" y="110">1D 28 6B ... QR</tspan>
      <tspan x="30" y="130">1D 76 30 ... IMG</tspan>
    </text>
    <text x="140" y="160" text-anchor="middle" fill="#ffedd5" opacity="0.35" font-family="'SF Mono','Fira Code',monospace" font-size="15" font-weight="bold" letter-spacing="6">ESC/POS</text>
  </g>

  <!-- Center dark backdrop for readability -->
  <rect width="1200" height="628" fill="url(#centerBackdrop)"/>

  <!-- "portakal" wordmark — BIGGER -->
  <text x="600" y="270" text-anchor="middle" fill="#ffffff" font-family="'Georgia','Playfair Display','Times New Roman',serif" font-size="160" font-weight="bold" letter-spacing="-4" filter="url(#glow-white)" opacity="0.98">portakal</text>

  <!-- Thin rule -->
  <line x1="260" y1="300" x2="940" y2="300" stroke="#fdba74" stroke-width="1.5" opacity="0.4"/>

  <!-- Tagline — bigger -->
  <text x="600" y="345" text-anchor="middle" fill="#ffedd5" font-family="'SF Mono','Fira Code','Menlo',monospace" font-size="20" letter-spacing="6" opacity="0.9">UNIVERSAL PRINTER LANGUAGE SDK</text>

  <!-- Feature pills — bigger -->
  <g font-family="'SF Mono','Fira Code','Menlo',monospace" font-size="14" letter-spacing="1.5">
    <g transform="translate(148, 372)">
      <rect x="0" y="0" width="178" height="42" rx="21" fill="#7c2d1280" stroke="#fdba74" stroke-width="1.3" opacity="0.8"/>
      <text x="89" y="28" text-anchor="middle" fill="#ffedd5" opacity="0.95">0 DEPENDENCIES</text>
    </g>
    <g transform="translate(342, 372)">
      <rect x="0" y="0" width="130" height="42" rx="21" fill="#7c2d1280" stroke="#fdba74" stroke-width="1.3" opacity="0.8"/>
      <text x="65" y="28" text-anchor="middle" fill="#ffedd5" opacity="0.95">PURE ESM</text>
    </g>
    <g transform="translate(488, 372)">
      <rect x="0" y="0" width="150" height="42" rx="21" fill="#7c2d1280" stroke="#fdba74" stroke-width="1.3" opacity="0.8"/>
      <text x="75" y="28" text-anchor="middle" fill="#ffedd5" opacity="0.95">TYPESCRIPT</text>
    </g>
    <g transform="translate(654, 372)">
      <rect x="0" y="0" width="168" height="42" rx="21" fill="#7c2d1280" stroke="#fdba74" stroke-width="1.3" opacity="0.8"/>
      <text x="84" y="28" text-anchor="middle" fill="#ffedd5" opacity="0.95">9 LANGUAGES</text>
    </g>
    <g transform="translate(838, 372)">
      <rect x="0" y="0" width="178" height="42" rx="21" fill="#7c2d1280" stroke="#fdba74" stroke-width="1.3" opacity="0.8"/>
      <text x="89" y="28" text-anchor="middle" fill="#ffedd5" opacity="0.95">63 CONVERTERS</text>
    </g>
  </g>

  <!-- Printer languages list — bigger -->
  <text x="600" y="455" text-anchor="middle" fill="#fed7aa" font-family="'SF Mono','Fira Code',monospace" font-size="15" letter-spacing="3" opacity="0.7">TSC · ZPL · EPL · ESC/POS · CPCL · DPL · IPL · SBPL · STAR PRNT</text>

  <!-- npm install badge -->
  <g transform="translate(460, 480)">
    <rect x="0" y="0" width="280" height="48" rx="10" fill="#431407" stroke="#9a3412" stroke-width="1.5" opacity="0.9"/>
    <text x="24" y="31" fill="#fb923c" font-family="'SF Mono','Fira Code',monospace" font-size="18">$</text>
    <text x="44" y="31" fill="#fdba74" font-family="'SF Mono','Fira Code',monospace" font-size="18"> npm i </text>
    <text x="134" y="31" fill="#ffffff" font-family="'SF Mono','Fira Code',monospace" font-size="18" font-weight="bold">portakal</text>
  </g>

  <!-- GitHub link -->
  <text x="600" y="576" text-anchor="middle" fill="#fdba74" font-family="'SF Mono','Fira Code',monospace" font-size="14" letter-spacing="1.5" opacity="0.6">github.com/productdevbook/portakal</text>

  <!-- Grain overlay -->
  <rect width="1200" height="628" filter="url(#grain)" opacity="0.15"/>

  <!-- Vignette -->
  <rect width="1200" height="628" fill="url(#vignetteGrad)" opacity="0.4"/>
</svg>
