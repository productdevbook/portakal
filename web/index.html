<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>portakal — Printer Language Playground</title>
    <meta
      name="description"
      content="Universal printer language SDK — design labels and receipts, see the output in real time."
    />
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍊</text></svg>"
    />
    <link rel="stylesheet" href="./app/assets/main.css" />
  </head>
  <body>
    <main id="app">
      <header>
        <h1><span class="accent">portakal</span></h1>
        <p>
          Universal printer language SDK — design labels &amp; receipts, see output in real time
        </p>
      </header>

      <nav class="tabs" role="tablist">
        <button class="tab active" data-tab="label" role="tab">Label</button>
        <button class="tab" data-tab="receipt" role="tab">Receipt</button>
      </nav>

      <section class="panel active" data-panel="label">
        <div class="split">
          <div class="controls">
            <!-- Label Setup -->
            <div class="ctrl-section">
              <div class="ctrl-header" data-collapse="setup">
                <h3>Label Setup</h3>
                <span class="toggle">&#9660;</span>
              </div>
              <div class="ctrl-body" data-section="setup">
                <div class="field">
                  <label for="lbl-width">Width (mm)</label>
                  <input id="lbl-width" type="number" value="40" min="1" />
                </div>
                <div class="field">
                  <label for="lbl-height">Height (mm)</label>
                  <input id="lbl-height" type="number" value="30" min="1" />
                </div>
                <div class="field">
                  <label for="lbl-dpi">DPI</label>
                  <select id="lbl-dpi">
                    <option value="203" selected>203</option>
                    <option value="300">300</option>
                    <option value="600">600</option>
                  </select>
                </div>
                <div class="field">
                  <label for="lbl-gap">Gap (mm)</label>
                  <input id="lbl-gap" type="number" value="3" min="0" />
                </div>
                <div class="field">
                  <label for="lbl-speed">Speed</label>
                  <input id="lbl-speed" type="number" value="4" min="1" max="10" />
                </div>
                <div class="field">
                  <label for="lbl-density">Density</label>
                  <input id="lbl-density" type="number" value="8" min="0" max="15" />
                </div>
                <div class="field">
                  <label for="lbl-copies">Copies</label>
                  <input id="lbl-copies" type="number" value="1" min="1" />
                </div>
              </div>
            </div>

            <!-- Text 1 -->
            <div class="ctrl-section">
              <div class="ctrl-header" data-collapse="text">
                <h3>
                  <label class="check-label"
                    ><input id="el-text-enable" type="checkbox" checked /> Text 1</label
                  >
                </h3>
                <span class="toggle">&#9660;</span>
              </div>
              <div class="ctrl-body" data-section="text">
                <div class="field full">
                  <label for="el-text">Content</label>
                  <input id="el-text" type="text" value="ACME Corp" spellcheck="false" />
                </div>
                <div class="field">
                  <label for="el-text-x">X</label><input id="el-text-x" type="number" value="10" />
                </div>
                <div class="field">
                  <label for="el-text-y">Y</label><input id="el-text-y" type="number" value="10" />
                </div>
                <div class="field">
                  <label for="el-text-size">Size</label
                  ><input id="el-text-size" type="number" value="2" min="1" max="10" />
                </div>
              </div>
            </div>

            <!-- Text 2 -->
            <div class="ctrl-section">
              <div class="ctrl-header" data-collapse="text2">
                <h3>
                  <label class="check-label"
                    ><input id="el-text2-enable" type="checkbox" checked /> Text 2</label
                  >
                </h3>
                <span class="toggle">&#9660;</span>
              </div>
              <div class="ctrl-body" data-section="text2">
                <div class="field full">
                  <label for="el-text2">Content</label>
                  <input id="el-text2" type="text" value="SKU: PRD-00123" spellcheck="false" />
                </div>
                <div class="field">
                  <label for="el-text2-x">X</label
                  ><input id="el-text2-x" type="number" value="10" />
                </div>
                <div class="field">
                  <label for="el-text2-y">Y</label
                  ><input id="el-text2-y" type="number" value="35" />
                </div>
                <div class="field">
                  <label for="el-text2-size">Size</label
                  ><input id="el-text2-size" type="number" value="1" min="1" max="10" />
                </div>
              </div>
            </div>

            <!-- Text 3 -->
            <div class="ctrl-section">
              <div class="ctrl-header" data-collapse="text3">
                <h3>
                  <label class="check-label"
                    ><input id="el-text3-enable" type="checkbox" /> Text 3</label
                  >
                </h3>
                <span class="toggle">&#9654;</span>
              </div>
              <div class="ctrl-body collapsed" data-section="text3">
                <div class="field full">
                  <label for="el-text3">Content</label>
                  <input id="el-text3" type="text" value="Made in Turkey" spellcheck="false" />
                </div>
                <div class="field">
                  <label for="el-text3-x">X</label
                  ><input id="el-text3-x" type="number" value="10" />
                </div>
                <div class="field">
                  <label for="el-text3-y">Y</label
                  ><input id="el-text3-y" type="number" value="55" />
                </div>
                <div class="field">
                  <label for="el-text3-size">Size</label
                  ><input id="el-text3-size" type="number" value="1" min="1" max="10" />
                </div>
              </div>
            </div>

            <!-- Shapes -->
            <div class="ctrl-section">
              <div class="ctrl-header" data-collapse="shapes">
                <h3>Shapes</h3>
                <span class="toggle">&#9660;</span>
              </div>
              <div class="ctrl-body" data-section="shapes">
                <div class="field full">
                  <label class="check-label"
                    ><input id="el-box-enable" type="checkbox" checked /> Box</label
                  >
                </div>
                <div class="field">
                  <label for="el-box-x">X</label><input id="el-box-x" type="number" value="5" />
                </div>
                <div class="field">
                  <label for="el-box-y">Y</label><input id="el-box-y" type="number" value="5" />
                </div>
                <div class="field">
                  <label for="el-box-w">W</label><input id="el-box-w" type="number" value="310" />
                </div>
                <div class="field">
                  <label for="el-box-h">H</label><input id="el-box-h" type="number" value="230" />
                </div>
                <div class="field">
                  <label for="el-box-t">Thick</label
                  ><input id="el-box-t" type="number" value="2" min="1" />
                </div>

                <div class="field full" style="margin-top: 0.25rem">
                  <label class="check-label"
                    ><input id="el-line-enable" type="checkbox" checked /> Line</label
                  >
                </div>
                <div class="field">
                  <label for="el-line-x1">X1</label
                  ><input id="el-line-x1" type="number" value="5" />
                </div>
                <div class="field">
                  <label for="el-line-y1">Y1</label
                  ><input id="el-line-y1" type="number" value="55" />
                </div>
                <div class="field">
                  <label for="el-line-x2">X2</label
                  ><input id="el-line-x2" type="number" value="315" />
                </div>
                <div class="field">
                  <label for="el-line-y2">Y2</label
                  ><input id="el-line-y2" type="number" value="55" />
                </div>
                <div class="field">
                  <label for="el-line-t">Thick</label
                  ><input id="el-line-t" type="number" value="1" min="1" />
                </div>

                <div class="field full" style="margin-top: 0.25rem">
                  <label class="check-label"
                    ><input id="el-circle-enable" type="checkbox" /> Circle</label
                  >
                </div>
                <div class="field">
                  <label for="el-circle-x">X</label
                  ><input id="el-circle-x" type="number" value="250" />
                </div>
                <div class="field">
                  <label for="el-circle-y">Y</label
                  ><input id="el-circle-y" type="number" value="150" />
                </div>
                <div class="field">
                  <label for="el-circle-d">Diameter</label
                  ><input id="el-circle-d" type="number" value="60" />
                </div>
                <div class="field">
                  <label for="el-circle-t">Thick</label
                  ><input id="el-circle-t" type="number" value="1" min="1" />
                </div>
              </div>
            </div>
          </div>

          <!-- Output -->
          <div class="output">
            <div class="preview-section">
              <div class="preview-header"><h3>Preview</h3></div>
              <div id="preview-container" class="preview-canvas"></div>
            </div>
            <div class="code-section">
              <div class="output-header">
                <div class="lang-tabs">
                  <button class="lang-tab active" data-lang="tsc">TSC</button>
                  <button class="lang-tab" data-lang="zpl">ZPL</button>
                  <button class="lang-tab" data-lang="epl">EPL</button>
                  <button class="lang-tab" data-lang="escpos">ESC/POS</button>
                </div>
                <button id="btn-copy" class="btn">Copy</button>
              </div>
              <div id="output-error" class="error" hidden></div>
              <pre id="output-code" class="output-code"></pre>
            </div>
          </div>
        </div>
      </section>

      <section class="panel" data-panel="receipt">
        <p style="color: var(--text-dim); text-align: center; padding: 3rem">
          Receipt designer coming soon.
        </p>
      </section>
    </main>
    <script type="module" src="./app/entry-client.ts"></script>
  </body>
</html>
